name: Update Delivery Status

on:
  schedule:
    - cron: '0 1 * * *'   # 每天 09:00 台灣時間（UTC+8 = UTC 01:00）
  workflow_dispatch:        # 也可以在 GitHub 上手動觸發

permissions:
  contents: write           # 允許 Actions 推回 hct_status.json

jobs:
  check-delivery:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          pip install requests ddddocr playwright

      - name: Install Playwright browsers
        run: playwright install chromium --with-deps

      - name: Install Xvfb (for headless=False Chrome)
        run: sudo apt-get install -y xvfb

      - name: Run delivery check (HCT + 7-11 + 全家)
        env:
          GM_USERNAME: ${{ secrets.GM_USER }}
          GM_PASSWORD: ${{ secrets.GM_PASS }}
        run: xvfb-run --auto-servernum python3 hct_updater.py

      - name: Commit and push hct_status.json
        run: |
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config user.name "github-actions[bot]"
          git add hct_status.json
          git diff --staged --quiet || git commit -m "auto: update delivery status $(date '+%Y/%m/%d %H:%M')"
          git push
